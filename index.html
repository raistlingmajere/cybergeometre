<script>


function setTheme()
{
	var themeColor = "teal";

	{

		case 2: 	themeColor = "green"; 		break;
			
		
	}
	document.getElementById("theme").href = "https://www.w3schools.com/lib/w3-theme-"+themeColor+".css";
} setTheme();


function getRndInteger(min, max) { return Math.floor(Math.random() * (max - min)) + min; }
